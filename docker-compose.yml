version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: gos-exam-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: gos_exam_analytics
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d gos_exam_analytics"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: gos-exam-api
    restart: always
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://postgres:postgrespassword@db:5432/gos_exam_analytics?schema=public
      PORT: 3000
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "npx prisma db push && node apps/api/dist/src/main.js"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        # Override with the public-facing API URL when deploying to a server:
        # docker-compose build --build-arg VITE_API_URL=https://api.yourdomain.com
        - VITE_API_URL=${VITE_API_URL:-http://localhost:3000}
    container_name: gos-exam-web
    restart: always
    ports:
      - "80:80"
    depends_on:
      - api

volumes:
  pgdata:
